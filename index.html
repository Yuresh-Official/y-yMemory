<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 A Special Question For You 💖</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #fff0f3;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Screen එකෙන් පිටට දුවන එක නවත්තන්න */
        }
        .run-btn {
            transition: all 0.2s ease;
            position: absolute;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center relative select-none">

    <!-- Main Card -->
    <div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-[#ffccd5] text-center max-w-sm z-10">
        <!-- Cute Robot / Heart Emoji -->
        <div class="text-6xl mb-4 animate-bounce">🤖💖</div>
        
        <h1 class="text-2xl font-bold text-[#4a304d] mb-2">System Inquiry:</h1>
        <p class="text-lg text-[#d81159] font-semibold mb-8">Oya mata adareyi da? 🥺👉👈</p>
        
        <!-- Container just to keep space, buttons are absolute -->
        <div class="h-16 w-full flex justify-center gap-4 relative">
            <button id="btnYes" class="run-btn bg-[#d81159] text-white px-8 py-3 rounded-full font-bold shadow-md cursor-pointer left-4 top-2">
                Ow 😍
            </button>
            <button id="btnNo" class="run-btn bg-[#8f2d56] text-white px-8 py-3 rounded-full font-bold shadow-md cursor-pointer right-4 top-2">
                Na 😭
            </button>
        </div>
    </div>

    <!-- Background decorative floating hearts -->
    <div class="absolute inset-0 pointer-events-none opacity-20 text-3xl">
        <span class="absolute top-10 left-10">❤️</span>
        <span class="absolute bottom-20 left-20">💖</span>
        <span class="absolute top-1/4 right-20">💗</span>
        <span class="absolute bottom-10 right-10">✨</span>
    </div>

    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');

        // Button එකක් උඩට Mouse එක ගෙනිච්චම හෝ Touch කරපු ගමන් දුවන්න හදන Function එක
        function moveButton(button) {
            // Screen එකේ size එක ගන්නවා
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            // Button එකට යන්න පුළුවන් උපරිම X සහ Y සීමාවන් (Card එක උඩටම නොයන විදිහට)
            const randomX = Math.floor(Math.random() * (screenWidth - button.offsetWidth - 40)) + 20;
            const randomY = Math.floor(Math.random() * (screenHeight - button.offsetHeight - 40)) + 20;

            // කෝඩ් එකෙන් Button එක අලුත් තැනකට පන්නනවා
            button.style.left = `${randomX}px`;
            button.style.top = `${randomY}px`;
        }

        // --- "Ow" Button එකට සෙල්ලම දාමු ---
        btnYes.addEventListener('mouseenter', () => moveButton(btnYes));
        btnYes.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Phone එකේදී click වීම වලක්වන්න
            moveButton(btnYes);
        });

        // --- "Na" Button එකට සෙල්ලම දාමු ---
        btnNo.addEventListener('mouseenter', () => moveButton(btnNo));
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton(btnNo);
        });
    </script>

</body>
</html>
