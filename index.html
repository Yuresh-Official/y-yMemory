<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 A Special Question For You 💖</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #fff0f3;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }
        .run-btn {
            transition: all 0.12s ease-out; /* තවත් වේගයෙන් සහ smoothව පනින්න */
            position: absolute;
            white-space: nowrap;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center relative select-none">

    <!-- Question Card -->
    <div id="questionCard" class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-[#ffccd5] text-center max-w-sm w-[90%] z-10 transition-all">
        <div class="text-6xl mb-4 animate-bounce">🤖💖</div>
        <h1 class="text-2xl font-bold text-[#4a304d] mb-2">System Inquiry:</h1>
        <p class="text-lg text-[#d81159] font-semibold mb-8">Oya mata adareyi da? 🥺👉👈</p>
        
        <!-- Button Container -->
        <div class="h-16 w-full flex justify-center gap-4 relative">
            <button id="btnYes" class="run-btn bg-[#d81159] text-white px-8 py-3 rounded-full font-bold shadow-md cursor-pointer left-[10%] top-2">
                Ow 😍
            </button>
            <button id="btnNo" class="run-btn bg-[#8f2d56] text-white px-8 py-3 rounded-full font-bold shadow-md cursor-pointer right-[10%] top-2">
                Na 😭
            </button>
        </div>
    </div>

    <!-- Success Card (Ow එබුවොත්) -->
    <div id="successCard" class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-green-200 text-center max-w-sm w-[90%] z-10 hidden">
        <div class="text-6xl mb-4">💖✨</div>
        <h1 class="text-2xl font-bold text-green-600 mb-4">Yayyy! 👑</h1>
        <p class="text-lg text-[#4a304d] font-medium leading-relaxed">
            Mamath adareyi raththaran oyata... 💖
        </p>
    </div>

    <!-- Smart Row Card (Na එබුවොත්) -->
    <div id="smartCard" class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-pink-200 text-center max-w-sm w-[90%] z-10 hidden">
        <div class="text-6xl mb-4">😘👉👈</div>
        <h1 class="text-2xl font-bold text-[#d81159] mb-4">Caught You! 😉</h1>
        <p class="text-lg text-[#4a304d] font-medium leading-relaxed">
            Man dannawa raththaran oya mata adareyi kiyala... 💕
        </p>
    </div>

    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const questionCard = document.getElementById('questionCard');
        const successCard = document.getElementById('successCard');
        const smartCard = document.getElementById('smartCard');

        let firstInteractedButton = null;

        function moveButton(button, id) {
            if (!firstInteractedButton) {
                firstInteractedButton = id;
            }

            if (firstInteractedButton === id) {
                // Screen එකේ නියම Size එක ගන්නවා
                const pad = 30; // Screen එක අයිනටම ගිහින් හැංගෙන එක නවත්තන්න පොඩි ඉඩක් (Padding)
                const maxX = window.innerWidth - button.offsetWidth - pad;
                const maxY = window.innerHeight - button.offsetHeight - pad;

                // 0 ඉඳන් උපරිම සීමාව ඇතුලත විතරක් Random තැනක් තෝරනවා
                let randomX = Math.floor(Math.random() * (maxX - pad)) + pad;
                let randomY = Math.floor(Math.random() * (maxY - pad)) + pad;

                // සීමාවෙන් පිට පනින්න දෙන්නේම නැහැ
                if (randomX < pad) randomX = pad;
                if (randomY < pad) randomY = pad;

                button.style.left = `${randomX}px`;
                button.style.top = `${randomY}px`;
            }
        }

        // --- YES Button Setup ---
        btnYes.addEventListener('mouseenter', () => moveButton(btnYes, 'yes'));
        btnYes.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton(btnYes, 'yes');
        });
        // Phone වල click/pointer events එකපාරම වැඩ කරන නිසා touchstart එක වගේම මෙතනත් දුවන්න අරිනවා
        btnYes.addEventListener('pointerdown', (e) => {
            if (firstInteractedButton === 'yes') {
                e.preventDefault();
                moveButton(btnYes, 'yes');
            }
        });
        btnYes.addEventListener('click', (e) => {
            if (firstInteractedButton === 'yes') {
                e.preventDefault();
                moveButton(btnYes, 'yes');
            } else {
                questionCard.classList.add('hidden');
                successCard.classList.remove('hidden');
            }
        });

        // --- NO Button Setup ---
        btnNo.addEventListener('mouseenter', () => moveButton(btnNo, 'no'));
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton(btnNo, 'no');
        });
        btnNo.addEventListener('pointerdown', (e) => {
            if (firstInteractedButton === 'no') {
                e.preventDefault();
                moveButton(btnNo, 'no');
            }
        });
        btnNo.addEventListener('click', (e) => {
            if (firstInteractedButton === 'no') {
                e.preventDefault();
                moveButton(btnNo, 'no');
            } else {
                questionCard.classList.add('hidden');
                smartCard.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
