<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 A Special Question For You 💖</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #fff0f3;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }
        /* බටන් දුවන සීමාව Card එක ඇතුළට විතරක් කොටු කරනවා */
        .card-container {
            position: relative;
            overflow: hidden; /* බටන් Card එකෙන් එලියට පනින එක නවත්තනවා */
        }
        .run-btn {
            position: absolute;
            transition: all 0.1s ease-out;
            white-space: nowrap;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center relative select-none p-4">

    <!-- Question Card (බටන් දුවන්නේ මේ කොටුව ඇතුළේ විතරයි) -->
    <div id="questionCard" class="card-container bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-[#ffccd5] text-center w-full max-w-sm h-[380px] flex flex-col justify-between z-10">
        <div>
            <div class="text-6xl mb-4 animate-bounce">🤖💖</div>
            <h1 class="text-2xl font-bold text-[#4a304d] mb-2">System Inquiry:</h1>
            <p class="text-lg text-[#d81159] font-semibold">Oya mata adareyi da? 🥺👉👈</p>
        </div>
        
        <!-- බටන් සෙල්ලම් දාන නියමිත Area එක -->
        <div id="buttonArea" class="h-48 w-full relative border border-dashed border-rose-100 rounded-2xl bg-rose-50/30 overflow-hidden">
            <button id="btnYes" class="run-btn bg-[#d81159] text-white px-8 py-3 rounded-full font-bold shadow-md cursor-pointer left-[15%] top-[35%]">
                Ow 😍
            </button>
            <button id="btnNo" class="run-btn bg-[#8f2d56] text-white px-8 py-3 rounded-full font-bold shadow-md cursor-pointer right-[15%] top-[35%]">
                Na 😭
            </button>
        </div>
    </div>

    <!-- Success Card (Ow එබුවොත්) -->
    <div id="successCard" class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-green-200 text-center w-full max-w-sm z-10 hidden">
        <div class="text-6xl mb-4">💖✨</div>
        <h1 class="text-2xl font-bold text-green-600 mb-4">Yayyy! 👑</h1>
        <p class="text-lg text-[#4a304d] font-medium leading-relaxed">
            Mamath adareyi raththaran oyata... 💖
        </p>
    </div>

    <!-- Smart Row Card (Na එබුවොත්) -->
    <div id="smartCard" class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-pink-200 text-center w-full max-w-sm z-10 hidden">
        <div class="text-6xl mb-4">😘👉👈</div>
        <h1 class="text-2xl font-bold text-[#d81159] mb-4">Caught You! 😉</h1>
        <p class="text-lg text-[#4a304d] font-medium leading-relaxed">
            Man dannawa raththaran oya mata adareyi kiyala... 💕
        </p>
    </div>

    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const buttonArea = document.getElementById('buttonArea');
        const questionCard = document.getElementById('questionCard');
        const successCard = document.getElementById('successCard');
        const smartCard = document.getElementById('smartCard');

        let firstInteractedButton = null;

        function moveButton(button, id) {
            if (!firstInteractedButton) {
                firstInteractedButton = id;
            }

            if (firstInteractedButton === id) {
                // දැන් බටන් එකේ සීමාව මනින්නේ මුළු Screen එකෙන් නෙමෙයි, අර Button Area කොටුවෙන් විතරයි!
                const areaWidth = buttonArea.clientWidth;
                const areaHeight = buttonArea.clientHeight;

                const pad = 10; // කොටුවේ අයිනටම නොයා ඉන්න padding එක
                const maxX = areaWidth - button.offsetWidth - pad;
                const maxY = areaHeight - button.offsetHeight - pad;

                let randomX = Math.floor(Math.random() * (maxX - pad)) + pad;
                let randomY = Math.floor(Math.random() * (maxY - pad)) + pad;

                // සීමාවන් පාලනය
                if (randomX < pad) randomX = pad;
                if (randomY < pad) randomY = pad;

                button.style.left = `${randomX}px`;
                button.style.top = `${randomY}px`;
            }
        }

        // --- YES Button Setup ---
        btnYes.addEventListener('mouseenter', () => moveButton(btnYes, 'yes'));
        btnYes.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton(btnYes, 'yes');
        });
        btnYes.addEventListener('pointerdown', (e) => {
            if (firstInteractedButton === 'yes') {
                e.preventDefault();
                moveButton(btnYes, 'yes');
            }
        });
        btnYes.addEventListener('click', (e) => {
            if (firstInteractedButton === 'yes') {
                e.preventDefault();
                moveButton(btnYes, 'yes');
            } else {
                questionCard.classList.add('hidden');
                successCard.classList.remove('hidden');
            }
        });

        // --- NO Button Setup ---
        btnNo.addEventListener('mouseenter', () => moveButton(btnNo, 'no'));
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton(btnNo, 'no');
        });
        btnNo.addEventListener('pointerdown', (e) => {
            if (firstInteractedButton === 'no') {
                e.preventDefault();
                moveButton(btnNo, 'no');
            }
        });
        btnNo.addEventListener('click', (e) => {
            if (firstInteractedButton === 'no') {
                e.preventDefault();
                moveButton(btnNo, 'no');
            } else {
                questionCard.classList.add('hidden');
                smartCard.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
